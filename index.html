<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            padding: 40px;
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        .required::after {
            content: " *";
            color: #e74c3c;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
            background-color: white;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            min-height: 100px;
            resize: vertical;
            font-family: inherit;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
        }
        
        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .message {
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        
        .loading { display: none; text-align: center; margin-top: 20px; }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .form-row { display: flex; gap: 15px; }
        .form-row .form-group { flex: 1; }
        
        .error-text {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }
        
        .intro {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; justify-content: center;
            align-items: center; z-index: 9999;
            animation: fadeOutIntro 0.5s ease-in-out 11s forwards;
        }
        
        .intro-text { color: #fff; font-size: 2em; text-align: center; padding: 20px; }
        
        @keyframes fadeOutIntro { 0% { opacity: 1; visibility: visible; } 100% { opacity: 0; visibility: hidden; } }

        @media (max-width: 600px) {
            .form-row { flex-direction: column; gap: 0; }
        }
    </style>
</head>
<body>
    <div class="intro">
        <div class="intro-text">
            <h2 id="typingText"></h2>
        </div>
    </div>
    
    <div class="container">
        <h1>Khai nhanhhhh</h1>
        <p class="subtitle">Mình muốn bắt chuyện với cậu mà mình chẳng biết gì về cậu cả </p>
        
        <form id="contactForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="name" class="required">Tớ gọi cậu là</label>
                    <input type="text" id="name" placeholder="muhehehe" required>
                    <div class="error-text" id="nameError"></div>
                </div>
                
                <div class="form-group">
                    <label for="phone" class="required">Liên hệ với cậu qua</label>
                    <input type="tel" id="phone" placeholder="Số điện thoại..." required>
                    <div class="error-text" id="phoneError"></div>
                </div>
            </div>

            <div class="form-group">
                <label for="status" class="required">Tình trạng mối quan hệ</label>
                <select id="status" required>
                    <option value="" disabled selected>Chọn một cái đi nè...</option>
                    <option value="chưa mảnh tình vắt vai">Chưa mảnh tình vắt vai 🐣</option>
                    <option value="cô đơn lẻ bóng">Cô đơn lẻ bóng 👤</option>
                    <option value="mập mờ cả thế giới">Mập mờ cả thế giới 🌫️</option>
                    <option value="nhất quán với 1 thằng (deo phai voi chu tus)">Nhất quán với 1 thằng (deo phai voi chu tus) 🤡</option>
                </select>
                <div class="error-text" id="statusError"></div>
            </div>
            
            <div class="form-group">
                <label for="address" class="required">Cậu đang sống ở đâu thế</label>
                <input type="text" id="address" placeholder="muhehehe" required>
                <div class="error-text" id="addressError"></div>
            </div>

            <div class="form-group">
                <label for="song">Bài hát yêu thích</label>
                <input type="text" id="song" placeholder="muhehehe...">
            </div>
            
            <div class="form-group">
                <label for="movie">Bộ phim yêu thích</label>
                <input type="text" id="movie" placeholder="muhehehe...">
            </div>
            
            <div class="form-group">
                <label for="message">Sở thích của cậu là gì?</label>
                <textarea id="message" placeholder="muhehehe..."></textarea>
            </div>
            
            <button type="submit" class="btn" id="submitBtn">Gửi cho tớ</button>
        </form>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Đang gửi...</p>
        </div>
        
        <div class="message success" id="successMessage">muheheehehehehe thành công rồi!</div>
        <div class="message error" id="errorMessage">lỗi rồi để tớ thử lại nhé</div>
    </div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <script>
        // Typing animation
        const textToType = "Hi chào cậu 💕\n\nMình muốn bắt chuyện với cậu mà mình chẳng biết gì về cậu cả 😊\n Hay là cậu cậu có thể điền vào form này để tớ có thể bắt chuyện với cậu nhé 😊";
        const typingText = document.getElementById('typingText');
        let index = 0;
        
        function typeText() {
            if (index < textToType.length) {
                typingText.innerHTML += textToType[index] === '\n' ? '<br>' : textToType[index];
                index++;
                setTimeout(typeText, 50);
            }
        }
        window.addEventListener('load', typeText);

        // EmailJS Init
        (function() { emailjs.init("ZSyyJzJ81ijEh2-Tp"); })();
        
        const form = document.getElementById('contactForm');
        
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Validate sơ bộ
            if(!document.getElementById('status').value) {
                alert('Chọn tình trạng mối quan hệ đã cậu ơi!');
                return;
            }

            document.getElementById('submitBtn').disabled = true;
            document.getElementById('loading').style.display = 'block';
            
            const formData = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                status: document.getElementById('status').value, // Dữ liệu mới
                address: document.getElementById('address').value,
                song: document.getElementById('song').value || 'Không có',
                movie: document.getElementById('movie').value || 'Không có',
                message: document.getElementById('message').value || 'Không có'
            };

            try {
                await emailjs.send('service_eq976yq', 'template_wzk8xaq', {
                    to_email: 'trinhnangduc2006@gmail.com',
                    from_name: formData.name,
                    phone: formData.phone,
                    relationship_status: formData.status, // Bạn nhớ chỉnh trong template EmailJS là {{relationship_status}} nhé
                    address: formData.address,
                    song: formData.song,
                    movie: formData.movie,
                    message: formData.message
                });
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('successMessage').style.display = 'block';
                form.reset();
            } catch (error) {
                console.error(error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('errorMessage').style.display = 'block';
            } finally {
                document.getElementById('submitBtn').disabled = false;
            }
        });
    </script>
</body>
</html>
